<div class="admin-layout">
  <app-admin-sidebar></app-admin-sidebar>

  <div class="admin-contenido">
    <div class="page-header">
      <h1>Nueva causa</h1>
    </div>

    <div class="form-card">

      @if (error) {
        <div class="alert error">{{ error }}</div>
      }

      @if (exito) {
        <div class="alert exito">{{ exito }}</div>
      }

      <div class="field">
        <label>Cliente</label>
        <select [(ngModel)]="caso.clienteId" class="select">
          @for (cliente of clientes; track cliente.id) {
            <option [value]="cliente.id">
              {{ cliente.nombre }} {{ cliente.apellido }}
            </option>
          }
        </select>
      </div>

      <div class="field">
        <label>Carátula</label>
        <input type="text" [(ngModel)]="caso.caratula"
          placeholder="Ej: García Juan c/ Empresa XYZ s/ Despido">
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Nro. de expediente</label>
          <input type="text" [(ngModel)]="caso.nroExpediente"
            placeholder="Ej: 12345/2026">
        </div>
        <div class="field">
          <label>Juzgado</label>
          <input type="text" [(ngModel)]="caso.juzgado"
            placeholder="Ej: Juzgado Civil Nro. 5">
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Tipo de proceso</label>
          <select [(ngModel)]="caso.tipo" class="select">
            @for (tipo of tipos; track tipo) {
              <option [value]="tipo">{{ tipo }}</option>
            }
          </select>
        </div>
        <div class="field">
          <label>Proceso</label>
          <select [(ngModel)]="caso.proceso" class="select">
            @for (proceso of procesos; track proceso) {
              <option [value]="proceso">{{ proceso }}</option>
            }
          </select>
        </div>
      </div>

      <div class="field">
        <label>Etapa inicial</label>
        <select [(ngModel)]="caso.etapa" class="select">
          @for (etapa of etapas; track etapa) {
            <option [value]="etapa">{{ etapa }}</option>
          }
        </select>
      </div>

      <button (click)="crear()" [disabled]="cargando" class="btn-primary">
        {{ cargando ? 'Creando causa...' : 'Crear causa' }}
      </button>

    </div>
  </div>
</div>
